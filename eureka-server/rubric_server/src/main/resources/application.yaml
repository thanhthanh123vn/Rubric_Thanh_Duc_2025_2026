server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: rubric-service
          uri: lb://RUBRIC-SERVICE
          predicates:
            - Path=/api/v1/rubrics/**
        - id: grading-service
          uri: lb://GRADING-SERVICE
          predicates:
            - Path=/api/v1/grades/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/