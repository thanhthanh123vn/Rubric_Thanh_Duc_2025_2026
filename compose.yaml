x-backend-environment: &backend-environment
  DB_NAME: ${DB_USER:-lms}
  DB_PW: ${DB_PASSWORD}
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_DATABASE:-db_rubric}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
  EUREKA_CLIENT_REGISTERWITHEUREKA: "true"
  EUREKA_CLIENT_FETCHREGISTRY: "true"
  EUREKA_INSTANCE_PREFERIPADDRESS: "true"
  SECRET_KEY: ${JWT_SECRET}
  APP_JWT_SECRET: ${JWT_SECRET}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-disabled}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-disabled}
  GOOGLE_APP_USERNAME: ${GOOGLE_APP_USERNAME:-disabled}
  GOOGLE_APP_PW: ${GOOGLE_APP_PW:-disabled}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-disabled}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-disabled}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-disabled}
  AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-disabled}
  AWS_SECRET_KEY: ${AWS_SECRET_KEY:-disabled}
  CLIENTS_USER_SERVICE_URL: http://user-service:8081/api/v1/user-service
  CLIENTS_COURSE_SERVICE_URL: http://course-service:8082

x-backend-defaults: &backend-defaults
  restart: unless-stopped
  networks:
    - lms-network
  environment: *backend-environment

services:
  mysql:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-db_rubric}
      MARIADB_USER: ${DB_USER:-lms}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - lms-network

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - lms-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - lms-network

  eureka-server:
    build: ./eureka-server/eureka-server
    restart: unless-stopped
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - lms-network

  user-service:
    <<: *backend-defaults
    build: ./user-service/user-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  course-service:
    <<: *backend-defaults
    build: ./course-service/course-service
    environment:
      <<: *backend-environment
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${DB_DATABASE:-db_rubric}
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      eureka-server:
        condition: service_started

  rubric-service:
    <<: *backend-defaults
    build: ./rubric-service/rubric-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  notification-service:
    <<: *backend-defaults
    build: ./notification-service/notification-service
    environment:
      <<: *backend-environment
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      eureka-server:
        condition: service_started

  grading-service:
    <<: *backend-defaults
    build: ./grading-service/grading-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  api-gateway:
    <<: *backend-defaults
    build: ./api-gateway/api-gateway
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      course-service:
        condition: service_started
      rubric-service:
        condition: service_started
      notification-service:
        condition: service_started
      grading-service:
        condition: service_started

  front-end:
    build:
      context: ./front-end
      args:
        VITE_API_BASE: /api/v1
        VITE_WS_URL: ""
        VITE_WS_URL_NOTICATION: ""
        VITE_AUTH_BASE: ""
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api-gateway
    networks:
      - lms-network

networks:
  lms-network:

volumes:
  mysql-data:
  mongo-data:
  redis-data:

